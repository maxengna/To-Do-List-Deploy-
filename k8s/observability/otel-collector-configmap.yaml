apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317

    exporters:
      otlp/tempo:
        endpoint: tempo-distributor.observability.svc.cluster.local:4317
        tls:
          insecure: true

      otlphttp/loki:
        endpoint: http://loki:3100/otlp

      prometheus:
        endpoint: "0.0.0.0:9090"

    processors:
      batch:

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/loki]

        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
